x-logging: &logging
  driver: json-file
  options:
    max-file: "5"
    max-size: 10m

services:
  # ─────────────────────────────────────────────
  # APPWRITE API
  # ─────────────────────────────────────────────
  appwrite:
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "doctor"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - gateway
      - appwrite
    expose:
      - "80"
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-imports:/storage/imports:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # CONSOLE (static UI)
  # ─────────────────────────────────────────────
  appwrite-console:
    image: appwrite/console:8.7.5
    logging: *logging
    restart: unless-stopped
    networks:
      - gateway
      - appwrite
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # REALTIME
  # ─────────────────────────────────────────────
  appwrite-realtime:
    entrypoint: realtime
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - gateway
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # WORKERS
  # ─────────────────────────────────────────────
  appwrite-worker-audits:
    entrypoint: worker-audits
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-worker-webhooks:
    entrypoint: worker-webhooks
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-worker-deletes:
    entrypoint: worker-deletes
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-certificates:/storage/certificates:rw
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-worker-databases:
    entrypoint: worker-databases
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-worker-builds:
    entrypoint: worker-builds
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - .env

  appwrite-worker-screenshots:
    entrypoint: worker-screenshots
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - .env

  appwrite-worker-certificates:
    entrypoint: worker-certificates
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-worker-executions:
    entrypoint: worker-executions
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-functions:
    entrypoint: worker-functions
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-mails:
    entrypoint: worker-mails
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-messaging:
    entrypoint: worker-messaging
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-migrations:
    entrypoint: worker-migrations
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-imports:/storage/imports:rw
      - appwrite-uploads:/storage/uploads:rw
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-stats-resources:
    entrypoint: worker-stats-resources
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-worker-stats-usage:
    entrypoint: worker-stats-usage
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # TASKS / SCHEDULERS
  # ─────────────────────────────────────────────
  appwrite-task-maintenance:
    entrypoint: maintenance
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-task-interval:
    entrypoint: interval
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-task-stats-resources:
    entrypoint: stats-resources
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    env_file:
      - .env

  appwrite-task-scheduler-functions:
    entrypoint: schedule-functions
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-task-scheduler-executions:
    entrypoint: schedule-executions
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  appwrite-task-scheduler-messages:
    entrypoint: schedule-messages
    image: ${_APP_IMAGE:-appwrite/appwrite}:${_APP_VERSION:-1.9.5}
    logging: *logging
    restart: on-failure:3
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      appwrite-embedding:
        condition: service_started
    env_file:
      - .env

  # ─────────────────────────────────────────────
  # OPTIONAL SERVICES
  # ─────────────────────────────────────────────
  appwrite-assistant:
    image: appwrite/assistant:0.8.4
    restart: unless-stopped
    networks:
      - appwrite
    env_file:
      - .env

  appwrite-browser:
    image: appwrite/browser:0.3.2
    restart: unless-stopped
    networks:
      - appwrite

  # ─────────────────────────────────────────────
  # OPEN RUNTIMES EXECUTOR
  # NOTE: hostname MUST stay "exc1" — _APP_EXECUTOR_HOST=http://exc1/v1
  # ─────────────────────────────────────────────
  openruntimes-executor:
    hostname: exc1
    image: openruntimes/executor:0.25.1
    logging: *logging
    stop_signal: SIGINT
    restart: unless-stopped
    networks:
      - appwrite
      - runtimes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-builds:/storage/builds:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - /tmp:/tmp:rw
    environment:
      - OPR_EXECUTOR_ENV=${_APP_ENV}
      - OPR_EXECUTOR_SECRET=${_APP_EXECUTOR_SECRET}
      - OPR_EXECUTOR_NETWORK=${_APP_COMPUTE_RUNTIMES_NETWORK:-runtimes}
      - OPR_EXECUTOR_RUNTIMES=${_APP_FUNCTIONS_RUNTIMES},${_APP_SITES_RUNTIMES}
      - OPR_EXECUTOR_IMAGE_PULL=enabled
      - OPR_EXECUTOR_INACTIVE_TRESHOLD=${_APP_COMPUTE_INACTIVE_THRESHOLD:-600}
      - OPR_EXECUTOR_MAINTENANCE_INTERVAL=${_APP_COMPUTE_MAINTENANCE_INTERVAL:-600}
      - OPR_EXECUTOR_DOCKER_HUB_USERNAME=${_APP_DOCKER_HUB_USERNAME}
      - OPR_EXECUTOR_DOCKER_HUB_PASSWORD=${_APP_DOCKER_HUB_PASSWORD}
      - OPR_EXECUTOR_LOGGING_CONFIG=${_APP_LOGGING_CONFIG}
      - OPR_EXECUTOR_STORAGE_DEVICE=${_APP_STORAGE_DEVICE:-Local}
      - OPR_EXECUTOR_RUNTIME_VERSIONS=v5
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Authorization: Bearer $$OPR_EXECUTOR_SECRET\" http://localhost/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ─────────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command:
      - mysqld
      - --innodb-flush-method=fsync
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgresql:
    image: appwrite/postgres:0.1.0
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-postgresql:/var/lib/postgresql/18/data:rw
    environment:
      - POSTGRES_DB=${_APP_DB_SCHEMA_VECTORSDB:-appwrite_vector}
      - POSTGRES_USER=${_APP_DB_USER_VECTORSDB:-appwrite_vector}
      - POSTGRES_PASSWORD=${_APP_DB_PASS_VECTORSDB}
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${_APP_DB_USER_VECTORSDB:-appwrite_vector}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7.4.7-alpine
    logging: *logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --maxmemory-samples
      - "5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  appwrite-embedding:
    image: appwrite/embedding:0.1.0
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-models:/home/embedder/models
    environment:
      - EMBEDDING_MODELS=${_APP_EMBEDDING_MODELS:-nomic-embed-text}

# ─────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────
networks:
  gateway:
    name: gateway
  appwrite:
    name: appwrite
  runtimes:
    name: runtimes

# ─────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────
volumes:
  appwrite-mariadb:
  appwrite-postgresql:
  appwrite-redis:
  appwrite-cache:
  appwrite-uploads:
  appwrite-imports:
  appwrite-certificates:
  appwrite-functions:
  appwrite-sites:
  appwrite-builds:
  appwrite-config:
  appwrite-models:
