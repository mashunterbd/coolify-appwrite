      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command:
      - mysqld
      - --innodb-flush-method=fsync
    healthcheck:
      &id010 test:
        - &id011 CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      &id012 interval: &id017 10s
      &id014 timeout: &id013 5s
      &id015 retries: &id009 10
      &id016 start_period: 30s
    *id004:
      - *id006
  postgresql:
    image: appwrite/postgres:0.1.0
    logging:
      driver: json-file
      options:
        max-file: *id001
        max-size: 10m
    volumes:
      - appwrite-postgresql:/var/lib/postgresql/18/data:rw
    environment:
      - POSTGRES_DB=${_APP_DB_SCHEMA}
      - POSTGRES_USER=${_APP_DB_USER}
      - POSTGRES_PASSWORD=${_APP_DB_PASS}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${_APP_DB_USER} -d ${_APP_DB_SCHEMA}
      interval: 5s
      timeout: 5s
      retries: *id009
      start_period: 10s
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    *id004:
      - *id006
  appwrite-embedding:
    image: appwrite/embedding:0.1.0
    environment:
      EMBEDDING_MODELS: ${_APP_EMBEDDING_MODELS:-nomic-embed-text}
    restart: unless-stopped
    volumes:
      - appwrite-models:/home/embedder/models
    *id004:
      - *id006
  redis:
    image: redis:7.4.7-alpine
    logging:
      driver: json-file
      options:
        max-file: *id001
        max-size: 10m
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --maxmemory-samples
      - *id001
    volumes:
      - appwrite-redis:/data:rw
    healthcheck:
      *id010:
        - *id011
        - redis-cli
        - ping
      *id012: *id013
      *id014: 3s
      *id015: 5
      *id016: *id017
    *id004:
      - *id006
volumes:
