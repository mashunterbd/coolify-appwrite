  appwrite-postgresql: *id018
  appwrite-redis: *id018
  appwrite-cache: *id018
  appwrite-uploads: *id018
  appwrite-imports: *id018
  appwrite-certificates: *id018
  appwrite-functions: *id018
  appwrite-sites: *id018
  appwrite-builds: *id018
  appwrite-config: *id018
  appwrite-models: *id018
  openruntimes-node-modules-cache: *id018
x-appwrite-env: *id008
*id004:
  *id005:
    &id019 name: *id005
  *id006:
