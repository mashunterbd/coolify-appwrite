x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

x-common-variables: &common-variables
  _APP_ENV: ${_APP_ENV:-production}
  _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:?Encryption key is required}
  _APP_DOMAIN: ${_APP_DOMAIN:?Domain is required}
  _APP_DOMAIN_TARGET: ${_APP_DOMAIN_TARGET:-}
  _APP_REDIS_HOST: ${_APP_REDIS_HOST:-redis}
  _APP_REDIS_PORT: ${_APP_REDIS_PORT:-6379}
  _APP_REDIS_USER: ${_APP_REDIS_USER:-}
  _APP_REDIS_PASS: ${_APP_REDIS_PASS:-}
  _APP_DB_HOST: ${_APP_DB_HOST:-mariadb}
  _APP_DB_PORT: ${_APP_DB_PORT:-3306}
  _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:?Database name is required}
  _APP_DB_USER: ${_APP_DB_USER:?Database user is required}
  _APP_DB_PASS: ${_APP_DB_PASS:?Database password is required}
  _APP_LOGGING_PROVIDER: ${_APP_LOGGING_PROVIDER:-}
  _APP_LOGGING_CONFIG: ${_APP_LOGGING_CONFIG:-}

services:

  # -------------------------------------------------------
  # MariaDB — primary database (starts first)
  # -------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      MARIADB_ROOT_PASSWORD: ${_APP_DB_ROOT_PASS:?Database root password is required}
      MARIADB_DATABASE: ${_APP_DB_SCHEMA:?Database name is required}
      MARIADB_USER: ${_APP_DB_USER:?Database user is required}
      MARIADB_PASSWORD: ${_APP_DB_PASS:?Database password is required}
      MARIADB_AUTO_UPGRADE: "1"
      MYSQL_ROOT_PASSWORD: ${_APP_DB_ROOT_PASS:?Database root password is required}
      MYSQL_DATABASE: ${_APP_DB_SCHEMA:?Database name is required}
      MYSQL_USER: ${_APP_DB_USER:?Database user is required}
      MYSQL_PASSWORD: ${_APP_DB_PASS:?Database password is required}
    command: "mysqld --innodb-flush-method=fsync"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------
  # Redis — cache / queue (starts first)
  # -------------------------------------------------------
  redis:
    image: redis:7.2.4-alpine
    <<: *x-logging
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory            512mb
      --maxmemory-policy     allkeys-lru
      --maxmemory-samples    5
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------
  # Appwrite — main API server
  # -------------------------------------------------------
  appwrite:
    image: appwrite/appwrite:1.9.5
    <<: *x-logging
    restart: unless-stopped
    networks:
      - gateway
      - appwrite
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      _APP_ENV: ${_APP_ENV:-production}
      _APP_LOCALE: ${_APP_LOCALE:-en}
      _APP_OPTIONS_ABUSE: ${_APP_OPTIONS_ABUSE:-enabled}
      _APP_OPTIONS_FORCE_HTTPS: ${_APP_OPTIONS_FORCE_HTTPS:-disabled}
      _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:?Encryption key is required}
      _APP_DOMAIN: ${_APP_DOMAIN:?Domain is required}
      _APP_DOMAIN_TARGET: ${_APP_DOMAIN_TARGET:-}
      _APP_DOMAIN_FUNCTIONS: ${_APP_DOMAIN_FUNCTIONS:-}
      _APP_REDIS_HOST: ${_APP_REDIS_HOST:-redis}
      _APP_REDIS_PORT: ${_APP_REDIS_PORT:-6379}
      _APP_REDIS_USER: ${_APP_REDIS_USER:-}
      _APP_REDIS_PASS: ${_APP_REDIS_PASS:-}
      _APP_DB_HOST: ${_APP_DB_HOST:-mariadb}
      _APP_DB_PORT: ${_APP_DB_PORT:-3306}
      _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:?Database name is required}
      _APP_DB_USER: ${_APP_DB_USER:?Database user is required}
      _APP_DB_PASS: ${_APP_DB_PASS:?Database password is required}
      _APP_SMTP_HOST: ${_APP_SMTP_HOST:-}
      _APP_SMTP_PORT: ${_APP_SMTP_PORT:-}
      _APP_SMTP_SECURE: ${_APP_SMTP_SECURE:-}
      _APP_SMTP_USERNAME: ${_APP_SMTP_USERNAME:-}
      _APP_SMTP_PASSWORD: ${_APP_SMTP_PASSWORD:-}
      _APP_USAGE_STATS: ${_APP_USAGE_STATS:-enabled}
      _APP_INFLUXDB_HOST: ${_APP_INFLUXDB_HOST:-}
      _APP_INFLUXDB_PORT: ${_APP_INFLUXDB_PORT:-}
      _APP_STORAGE_LIMIT: ${_APP_STORAGE_LIMIT:-30000000}
      _APP_STORAGE_PREVIEW_LIMIT: ${_APP_STORAGE_PREVIEW_LIMIT:-20000000}
      _APP_STORAGE_ANTIVIRUS: ${_APP_STORAGE_ANTIVIRUS:-disabled}
      _APP_STORAGE_ANTIVIRUS_HOST: ${_APP_STORAGE_ANTIVIRUS_HOST:-}
      _APP_STORAGE_ANTIVIRUS_PORT: ${_APP_STORAGE_ANTIVIRUS_PORT:-}
      _APP_STORAGE_DEVICE: ${_APP_STORAGE_DEVICE:-local}
      _APP_STORAGE_S3_ACCESS_KEY: ${_APP_STORAGE_S3_ACCESS_KEY:-}
      _APP_STORAGE_S3_SECRET: ${_APP_STORAGE_S3_SECRET:-}
      _APP_STORAGE_S3_REGION: ${_APP_STORAGE_S3_REGION:-}
      _APP_STORAGE_S3_BUCKET: ${_APP_STORAGE_S3_BUCKET:-}
      _APP_STORAGE_DO_SPACES_ACCESS_KEY: ${_APP_STORAGE_DO_SPACES_ACCESS_KEY:-}
      _APP_STORAGE_DO_SPACES_SECRET: ${_APP_STORAGE_DO_SPACES_SECRET:-}
      _APP_STORAGE_DO_SPACES_REGION: ${_APP_STORAGE_DO_SPACES_REGION:-}
      _APP_STORAGE_DO_SPACES_BUCKET: ${_APP_STORAGE_DO_SPACES_BUCKET:-}
      _APP_STORAGE_BACKBLAZE_ACCESS_KEY: ${_APP_STORAGE_BACKBLAZE_ACCESS_KEY:-}
      _APP_STORAGE_BACKBLAZE_SECRET: ${_APP_STORAGE_BACKBLAZE_SECRET:-}
      _APP_STORAGE_BACKBLAZE_REGION: ${_APP_STORAGE_BACKBLAZE_REGION:-}
      _APP_STORAGE_BACKBLAZE_BUCKET: ${_APP_STORAGE_BACKBLAZE_BUCKET:-}
      _APP_STORAGE_LINODE_ACCESS_KEY: ${_APP_STORAGE_LINODE_ACCESS_KEY:-}
      _APP_STORAGE_LINODE_SECRET: ${_APP_STORAGE_LINODE_SECRET:-}
      _APP_STORAGE_LINODE_REGION: ${_APP_STORAGE_LINODE_REGION:-}
      _APP_STORAGE_LINODE_BUCKET: ${_APP_STORAGE_LINODE_BUCKET:-}
      _APP_STORAGE_WASABI_ACCESS_KEY: ${_APP_STORAGE_WASABI_ACCESS_KEY:-}
      _APP_STORAGE_WASABI_SECRET: ${_APP_STORAGE_WASABI_SECRET:-}
      _APP_STORAGE_WASABI_REGION: ${_APP_STORAGE_WASABI_REGION:-}
      _APP_STORAGE_WASABI_BUCKET: ${_APP_STORAGE_WASABI_BUCKET:-}
      _APP_FUNCTIONS_SIZE_LIMIT: ${_APP_FUNCTIONS_SIZE_LIMIT:-30000000}
      _APP_FUNCTIONS_TIMEOUT: ${_APP_FUNCTIONS_TIMEOUT:-900}
      _APP_FUNCTIONS_BUILD_TIMEOUT: ${_APP_FUNCTIONS_BUILD_TIMEOUT:-900}
      _APP_FUNCTIONS_CPUS: ${_APP_FUNCTIONS_CPUS:-0}
      _APP_FUNCTIONS_MEMORY: ${_APP_FUNCTIONS_MEMORY:-0}
      _APP_FUNCTIONS_RUNTIMES: ${_APP_FUNCTIONS_RUNTIMES:-node-18.0,python-3.9,php-8.0}
      _APP_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      _APP_EXECUTOR_HOST: ${_APP_EXECUTOR_HOST:-http://openruntimes-executor/v1}
      _APP_LOGGING_PROVIDER: ${_APP_LOGGING_PROVIDER:-}
      _APP_LOGGING_CONFIG: ${_APP_LOGGING_CONFIG:-}
      _APP_MAINTENANCE_INTERVAL: ${_APP_MAINTENANCE_INTERVAL:-86400}
      _APP_MAINTENANCE_RETENTION_CACHE: ${_APP_MAINTENANCE_RETENTION_CACHE:-2592000}
      _APP_MAINTENANCE_RETENTION_EXECUTION: ${_APP_MAINTENANCE_RETENTION_EXECUTION:-1209600}
      _APP_MAINTENANCE_RETENTION_AUDIT: ${_APP_MAINTENANCE_RETENTION_AUDIT:-1209600}
      _APP_MAINTENANCE_RETENTION_ABUSE: ${_APP_MAINTENANCE_RETENTION_ABUSE:-86400}
      _APP_MAINTENANCE_RETENTION_USAGE_HOURLY: ${_APP_MAINTENANCE_RETENTION_USAGE_HOURLY:-8640000}
      _APP_SMS_PROVIDER: ${_APP_SMS_PROVIDER:-}
      _APP_SMS_FROM: ${_APP_SMS_FROM:-}
      _APP_GRAPHQL_MAX_BATCH_SIZE: ${_APP_GRAPHQL_MAX_BATCH_SIZE:-10}
      _APP_GRAPHQL_MAX_COMPLEXITY: ${_APP_GRAPHQL_MAX_COMPLEXITY:-250}
      _APP_GRAPHQL_MAX_DEPTH: ${_APP_GRAPHQL_MAX_DEPTH:-3}
      _APP_VCS_GITHUB_APP_NAME: ${_APP_VCS_GITHUB_APP_NAME:-}
      _APP_VCS_GITHUB_PRIVATE_KEY: ${_APP_VCS_GITHUB_PRIVATE_KEY:-}
      _APP_VCS_GITHUB_APP_ID: ${_APP_VCS_GITHUB_APP_ID:-}
      _APP_VCS_GITHUB_CLIENT_ID: ${_APP_VCS_GITHUB_CLIENT_ID:-}
      _APP_VCS_GITHUB_CLIENT_SECRET: ${_APP_VCS_GITHUB_CLIENT_SECRET:-}
      _APP_VCS_GITHUB_WEBHOOK_SECRET: ${_APP_VCS_GITHUB_WEBHOOK_SECRET:-}
      _APP_ASSISTANT_OPENAI_API_KEY: ${_APP_ASSISTANT_OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -------------------------------------------------------
  # Appwrite Console — web UI
  # -------------------------------------------------------
  appwrite-console:
    image: appwrite/console:8.2.1
    <<: *x-logging
    restart: unless-stopped
    networks:
      - gateway
      - appwrite
    environment:
      _APP_DOMAIN: ${_APP_DOMAIN:?Domain is required}
      _APP_DOMAIN_TARGET: ${_APP_DOMAIN_TARGET:-}

  # -------------------------------------------------------
  # Realtime worker
  # -------------------------------------------------------
  appwrite-realtime:
    image: appwrite/appwrite:1.9.5
    entrypoint: realtime
    <<: *x-logging
    restart: unless-stopped
    networks:
      - gateway
      - appwrite
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables
      _APP_USAGE_STATS: ${_APP_USAGE_STATS:-enabled}

  # -------------------------------------------------------
  # Background workers
  # -------------------------------------------------------
  appwrite-worker-audits:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-audits
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-worker-webhooks:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-webhooks
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-worker-deletes:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-deletes
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-certificates:/storage/certificates:rw
    environment:
      <<: *common-variables

  appwrite-worker-databases:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-databases
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-worker-builds:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-builds
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-uploads:/storage/uploads:rw
    environment:
      <<: *common-variables
      _APP_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      _APP_EXECUTOR_HOST: ${_APP_EXECUTOR_HOST:-http://openruntimes-executor/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  appwrite-worker-certificates:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-certificates
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
    environment:
      <<: *common-variables

  appwrite-worker-functions:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-functions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      openruntimes-executor:
        condition: service_started
    environment:
      <<: *common-variables
      _APP_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      _APP_EXECUTOR_HOST: ${_APP_EXECUTOR_HOST:-http://openruntimes-executor/v1}

  appwrite-worker-mails:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-mails
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables
      _APP_SMTP_HOST: ${_APP_SMTP_HOST:-}
      _APP_SMTP_PORT: ${_APP_SMTP_PORT:-}
      _APP_SMTP_SECURE: ${_APP_SMTP_SECURE:-}
      _APP_SMTP_USERNAME: ${_APP_SMTP_USERNAME:-}
      _APP_SMTP_PASSWORD: ${_APP_SMTP_PASSWORD:-}

  appwrite-worker-messaging:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-messaging
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    environment:
      <<: *common-variables
      _APP_SMS_PROVIDER: ${_APP_SMS_PROVIDER:-}
      _APP_SMS_FROM: ${_APP_SMS_FROM:-}

  appwrite-worker-migrations:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-migrations
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    environment:
      <<: *common-variables

  # -------------------------------------------------------
  # Tasks / schedulers
  # -------------------------------------------------------
  appwrite-task-maintenance:
    image: appwrite/appwrite:1.9.5
    entrypoint: maintenance
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables
      _APP_MAINTENANCE_INTERVAL: ${_APP_MAINTENANCE_INTERVAL:-86400}
      _APP_MAINTENANCE_RETENTION_CACHE: ${_APP_MAINTENANCE_RETENTION_CACHE:-2592000}
      _APP_MAINTENANCE_RETENTION_EXECUTION: ${_APP_MAINTENANCE_RETENTION_EXECUTION:-1209600}
      _APP_MAINTENANCE_RETENTION_AUDIT: ${_APP_MAINTENANCE_RETENTION_AUDIT:-1209600}
      _APP_MAINTENANCE_RETENTION_ABUSE: ${_APP_MAINTENANCE_RETENTION_ABUSE:-86400}
      _APP_MAINTENANCE_RETENTION_USAGE_HOURLY: ${_APP_MAINTENANCE_RETENTION_USAGE_HOURLY:-8640000}

  appwrite-task-scheduler-functions:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-functions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-task-scheduler-executions:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-executions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-task-scheduler-messages:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-messages
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-variables

  appwrite-worker-stats-resources:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-stats-resources
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      <<: *common-variables
      _APP_USAGE_STATS: ${_APP_USAGE_STATS:-enabled}

  appwrite-worker-stats-usage:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-stats-usage
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      <<: *common-variables
      _APP_USAGE_STATS: ${_APP_USAGE_STATS:-enabled}

  # -------------------------------------------------------
  # OpenRuntimes — function execution engine
  # -------------------------------------------------------
  openruntimes-executor:
    image: openruntimes/executor:0.7.1
    hostname: exc1
    <<: *x-logging
    restart: unless-stopped
    stop_signal: SIGINT
    networks:
      - appwrite
      - runtimes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-builds:/storage/builds:rw
      - appwrite-functions:/storage/functions:rw
      - /tmp:/tmp:rw
    environment:
      OPR_EXECUTOR_IMAGE_PULL: enabled
      OPR_EXECUTOR_INACTIVE_TRESHOLD: ${_APP_COMPUTE_INACTIVE_THRESHOLD:-600}
      OPR_EXECUTOR_MAINTENANCE_INTERVAL: ${_APP_COMPUTE_MAINTENANCE_INTERVAL:-3600}
      OPR_EXECUTOR_NETWORK: ${_APP_COMPUTE_RUNTIMES_NETWORK:-runtimes}
      OPR_EXECUTOR_DOCKER_HUB_USERNAME: ${_APP_DOCKER_HUB_USERNAME:-}
      OPR_EXECUTOR_DOCKER_HUB_PASSWORD: ${_APP_DOCKER_HUB_PASSWORD:-}
      OPR_EXECUTOR_ENV: ${_APP_ENV:-production}
      OPR_EXECUTOR_RUNTIMES: ${_APP_FUNCTIONS_RUNTIMES:-node-18.0,python-3.9,php-8.0}
      OPR_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      OPR_EXECUTOR_RUNTIME_VERSIONS: v5
      OPR_EXECUTOR_LOGGING_CONFIG: ${_APP_LOGGING_CONFIG:-}
      OPR_EXECUTOR_STORAGE_DEVICE: ${_APP_STORAGE_DEVICE:-local}

  openruntimes-proxy:
    image: openruntimes/proxy:0.5.0
    hostname: proxy
    <<: *x-logging
    restart: unless-stopped
    stop_signal: SIGINT
    networks:
      - appwrite
      - runtimes
    environment:
      OPR_PROXY_WORKER_PER_CORE: ${_APP_WORKER_PER_CORE:-6}
      OPR_PROXY_ENV: ${_APP_ENV:-production}
      OPR_PROXY_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      OPR_PROXY_SECRET: ${_APP_EXECUTOR_SECRET:?Executor secret is required}
      OPR_PROXY_LOGGING_CONFIG: ${_APP_LOGGING_CONFIG:-}
      OPR_PROXY_ALGORITHM: random
      OPR_PROXY_EXECUTORS: exc1
      OPR_PROXY_HEALTHCHECK_INTERVAL: 10000
      OPR_PROXY_MAX_TIMEOUT: 600
      OPR_PROXY_HEALTHCHECK: enabled

networks:
  gateway:
    external: true
  appwrite:
  runtimes:

volumes:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-cache:
  appwrite-uploads:
  appwrite-certificates:
  appwrite-functions:
  appwrite-builds:
  appwrite-config:
